    concepts:
      - Implementing AsyncIterable<T> from scratch
      - Composable pipeline — each operation returns an AsyncIterable
      - map, filter, take, chunk as async generator adapters
      - Cancellation via Symbol.asyncDispose — signal propagation
      - await using in the pipeline driver
      - Type safety — preserving T through transformations
    build_piece_role: |
      The complete AsyncPipeline<T> class. This lesson adds all pipeline
