topic: "TypeScript Symbols, Iterators, Iterables, Streams, and Cleanup"
shape: hybrid
build_piece: "AsyncPipeline<T> — composable async iterable pipeline with Symbol.asyncDispose cancellation"

lessons:
  - id: 01-symbol-primitive
    depends_on: []
    type: koan
    currency: stable
    audio_value: high
    estimated_minutes: 35
    concepts:
      - Symbol() creates a unique, non-string primitive
      - Symbol description is for debugging, not identity
      - Symbol.for() and Symbol.keyFor() for global registry
      - Symbols are not enumerable in for...in or Object.keys
      - Symbol as unique object property key (collision-free)

  - id: 02-well-known-symbols
    depends_on: [01-symbol-primitive]
    type: koan
    currency: stable
    audio_value: medium
    estimated_minutes: 40
    concepts:
      - Symbol.iterator — marks an object as sync iterable
      - Symbol.asyncIterator — marks an object as async iterable
      - Symbol.toPrimitive — controls type coercion
      - Symbol.hasInstance — customizes instanceof
      - Symbol.toStringTag — customizes Object.prototype.toString
      - Well-known symbols as extension points for built-in protocols

  - id: 03-iterator-protocol
    depends_on: [02-well-known-symbols]
    type: koan
    currency: stable
    audio_value: high
    estimated_minutes: 45
    concepts:
      - Iterator interface — next() returns IteratorResult<T>
      - IteratorResult shape — { value: T, done: false } | { value: TReturn, done: true }
      - Optional return() method — iterator cleanup on early exit
      - Optional throw() method — injecting errors into the iterator
      - Iterator contract — once done, always done
    framing_notes: |
      Compare to pull-based vs. push-based data sources. The iterator protocol
      is a pull model (consumer drives). Note why { value, done } instead of
      a sentinel value or throwing — the design avoids ambiguity with undefined
      values and allows typed return values.

  - id: 04-iterable-protocol
    depends_on: [03-iterator-protocol]
    type: koan
    currency: stable
    audio_value: medium
    estimated_minutes: 40
    concepts:
      - Iterable interface — [Symbol.iterator]() returns an Iterator
      - for...of desugaring — calls [Symbol.iterator]() then next() in a loop
      - Spread syntax on iterables
      - Destructuring assignment from iterables
      - Array.from() on custom iterables
      - Iterators that are also iterables (return this from [Symbol.iterator])

  - id: 05-generator-functions
    depends_on: [04-iterable-protocol]
    type: koan
    currency: stable
    audio_value: medium
    estimated_minutes: 50
    concepts:
      - function* syntax — creates a GeneratorFunction
      - yield pauses execution and emits a value
      - Generator objects implement both Iterator and Iterable
      - Lazy evaluation — body executes only when iterated
      - yield* delegates to another iterable
      - next(value) sends a value back into a paused generator

  - id: 06-generator-return-and-throw
    depends_on: [05-generator-functions]
    type: koan
    currency: stable
    audio_value: medium
    estimated_minutes: 45
    concepts:
      - Generator.prototype.return(value) — forces done: true with given value
      - Generator.prototype.throw(error) — injects an error at the yield site
      - try/finally in generators — finally runs on return() or throw()
      - return value of a generator function (the done:true value)
      - Cleanup in generators via try/finally

  - id: 07-lazy-sequences
    depends_on: [05-generator-functions]
    type: koan
    currency: stable
    audio_value: medium
    estimated_minutes: 40
    concepts:
      - Infinite iterables — sequences that never set done:true
      - take(n) — materializing a prefix of a lazy sequence
      - map and filter as generator adapters
      - Composing iterators without intermediate arrays
      - Memory characteristics of lazy vs. eager evaluation

  - id: 08-async-iterator-protocol
    depends_on: [03-iterator-protocol]
    type: koan
    currency: stable
    audio_value: high
    estimated_minutes: 45
    concepts:
      - AsyncIterator interface — next() returns Promise<IteratorResult<T>>
      - Symbol.asyncIterator — marks an object as async iterable
      - for await...of — drives async iterators
      - AsyncIterator return() and throw() are async
      - Async iteration contract — awaiting each step, ordering guarantees
    framing_notes: |
      Compare to the sync iterator design — why async iteration uses Promises
      rather than callbacks. Note what changes: next() is async, but the
      pull-based consumer model is preserved. Contrast with push-based
      event emitters and Observable.

  - id: 09-async-generators
    depends_on: [08-async-iterator-protocol, 06-generator-return-and-throw]
    type: koan
    currency: stable
    audio_value: medium
    estimated_minutes: 45
    concepts:
      - async function* syntax
      - yield in async context — pauses and emits
      - await inside async generators — pauses for Promises
      - async generators implement AsyncIterator and AsyncIterable
      - Error handling in async generators
      - Combining await and yield for async data sources

  - id: 10-streams-api
    depends_on: [09-async-generators]
    type: koan
    currency: versioned
    audio_value: medium
    estimated_minutes: 60
    concepts:
      - ReadableStream — a source of data chunks
      - WritableStream — a sink for data chunks
      - TransformStream — a ReadableStream/WritableStream pair
      - Piping with pipeTo() and pipeThrough()
      - ReadableStream[Symbol.asyncIterator]() — consuming streams as async iterables
      - Backpressure — the mechanism that throttles producers
      - BYOB (Bring Your Own Buffer) readers

  - id: 11-explicit-resource-management
    depends_on: [02-well-known-symbols]
    type: koan
    currency: frontier
    audio_value: high
    estimated_minutes: 50
    concepts:
      - Symbol.dispose — marks a synchronous disposable
      - Symbol.asyncDispose — marks an async disposable
      - using declaration — calls Symbol.dispose at block exit
      - await using declaration — calls Symbol.asyncDispose at block exit
      - DisposableStack and AsyncDisposableStack — composite disposal
      - Disposal ordering — LIFO, mirroring acquisition order
      - Error suppression rules during disposal
    framing_notes: |
      Compare to finally blocks, try-with-resources (Java), using statement
      (C#), and RAII (C++). Why a language-level feature rather than a
      library pattern? Note how Symbol.asyncDispose enables cleanup in
      async generators — the missing piece before this proposal.

  - id: 12-async-pipeline
    depends_on: [09-async-generators, 11-explicit-resource-management]
    type: build_piece
    currency: stable
    audio_value: low
